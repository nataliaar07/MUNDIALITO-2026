<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mundialito SCJ 2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Colores Oficiales del Mundial 2026 */
            --bg-body: #f0f3f8;
            --bg-card: #ffffff;
            --text-dark: #0f172a;
            --text-muted: #64748b;
            --border-color: #cbd5e1;
            
            --brand-purple: #5c068c;
            --brand-pink: #ff007f;
            --brand-blue: #00d2ff;
            --brand-orange: #ff5a00;
            --brand-green: #00e676;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        /* CONTROL ABSOLUTO DE LA PANTALLA FIJA */
        body {
            background-color: var(--bg-body);
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(92, 6, 140, 0.04) 0%, transparent 35%),
                radial-gradient(circle at 100% 100%, rgba(0, 210, 255, 0.04) 0%, transparent 35%);
            color: var(--text-dark);
            height: 100vh;
            max-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden; /* Evita scrolls raros en ventanas pequeñas */
        }

        /* HEADER FLEXIBLE QUE SE ADAPTA */
        header {
            width: 100%;
            background: linear-gradient(135deg, var(--brand-purple), #2d004d);
            padding: 15px 30px;
            box-shadow: 0 4px 20px rgba(92, 6, 140, 0.15);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0; /* Impide que se achique o se corte */
            border-bottom: 5px solid var(--brand-pink);
            position: relative;
        }

        header::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 25%;
            height: 5px;
            background: var(--brand-blue);
        }

        .logo-area h1 {
            font-size: 1.8rem;
            font-weight: 800;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: -1px;
            line-height: 1.1;
        }

        .logo-area h1 span {
            background: linear-gradient(to right, var(--brand-blue), var(--brand-green));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo-area p {
            color: rgba(255, 255, 255, 0.7);
            font-weight: 700;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .rules-bar {
            display: flex;
            gap: 10px;
        }

        .rule-item {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 700;
            color: #ffffff;
            text-transform: uppercase;
        }

        /* ÁREA CENTRAL AJUSTABLE AL ALTO RESTANTE */
        .tournament-wrapper {
            flex-grow: 1; 
            width: 100%;
            padding: 15px 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: auto; /* Permite scroll horizontal si la pantalla es muy angosta */
        }

        .bracket-container {
            display: grid;
            grid-template-columns: 240px 240px 240px 290px 240px 240px 240px;
            gap: 15px;
            align-items: center;
            width: 100%;
            max-width: 1800px;
            height: 100%; /* Toma el alto exacto disponible */
        }

        /* COLUMNAS CON DISTRIBUCIÓN EQUITATIVA (FLEX) */
        .bracket-column {
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            height: 100%; 
            padding: 5px 0;
        }

        .column-header {
            text-align: center;
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--brand-purple);
            padding: 4px;
            background: rgba(92, 6, 140, 0.05);
            border-radius: 4px;
            margin-bottom: 5px;
        }

        /* COMPACTACIÓN DE TARJETAS PARA EVITAR CORTES */
        .match-box {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 8px 10px;
            box-shadow: 0 4px 15px rgba(15, 23, 42, 0.04);
            position: relative;
            overflow: hidden;
        }

        .match-box::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: var(--brand-blue);
        }

        .bracket-column:nth-child(2) .match-box::before,
        .bracket-column:nth-child(6) .match-box::before {
            background: var(--brand-purple);
        }

        .bracket-column:nth-child(3) .match-box::before,
        .bracket-column:nth-child(5) .match-box::before {
            background: var(--brand-pink);
        }

        .match-header {
            font-size: 0.65rem;
            font-weight: 800;
            color: var(--text-muted);
            margin-bottom: 6px;
            text-transform: uppercase;
            display: flex;
            justify-content: space-between;
        }

        .team-slot {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px 8px;
            margin: 4px 0;
            border-radius: 6px;
            background: #f8fafc;
            border: 1px solid #f1f5f9;
            font-weight: 700;
            font-size: 0.85rem;
        }

        .team-meta {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .team-badge-ui {
            width: 28px;
            height: 18px;
            background: var(--brand-purple);
            color: #ffffff;
            font-size: 0.6rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 3px;
        }

        .team-rank {
            font-size: 0.6rem;
            color: var(--text-muted);
            background: #e2e8f0;
            padding: 2px 4px;
            border-radius: 3px;
        }

        .team-slot.winner {
            background-color: #f0fdf4;
            border-color: #bbf7d0;
            color: #166534;
        }

        .team-slot.winner .team-badge-ui {
            background: var(--brand-green);
            color: #000000;
        }

        .team-slot.loser {
            opacity: 0.35;
            background-color: #f1f5f9;
            filter: grayscale(1);
        }

        .team-slot.pending {
            color: var(--text-muted);
            font-style: italic;
            font-weight: 500;
        }

        .team-slot.pending .team-badge-ui {
            background: #cbd5e1;
            color: var(--text-muted);
        }

        /* GRANDE FINAL TOTALMENTE RESPONSIVA */
        .grand-final-box {
            border: 2px solid var(--brand-orange);
            background: linear-gradient(to bottom, #ffffff, #fffaf0);
            box-shadow: 0 10px 25px rgba(255, 90, 0, 0.12);
        }

        .grand-final-box::before {
            background: var(--brand-orange) !important;
            width: 5px;
        }

        .grand-final-box .match-header {
            color: var(--brand-orange);
        }

        .champion-banner {
            display: none;
            background: linear-gradient(135deg, var(--brand-purple), var(--brand-pink));
            color: white;
            text-align: center;
            font-weight: 800;
            font-size: 0.75rem;
            padding: 6px;
            border-radius: 4px;
            margin-top: 8px;
            text-transform: uppercase;
        }

        /* PIE DE PÁGINA FIJO INFERIOR */
        footer {
            width: 100%;
            text-align: center;
            font-size: 0.8rem;
            font-weight: 800;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 2px;
            padding: 12px;
            background: #0f172a;
            border-top: 3px solid var(--brand-green);
            flex-shrink: 0; /* Evita que se colapse */
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-area">
            <h1>Mundialito <span>SCJ 2026</span></h1>
            <p>Fase Final Eliminatoria</p>
        </div>
        <div class="rules-bar">
            <div class="rule-item">10 Jugadores</div>
            <div class="rule-item">30 Minutos</div>
            <div class="rule-item">Penales</div>
            <div class="rule-item">Fair Play</div>
        </div>
    </header>

    <div class="tournament-wrapper">
        <main class="bracket-container">
            
            <div class="bracket-column">
                <div class="column-header">Octavos</div>
                <div class="match-box" id="match-octavos1"></div>
                <div class="match-box" id="match-octavos2"></div>
                <div class="match-box" id="match-octavos3"></div>
                <div class="match-box" id="match-octavos4"></div>
            </div>

            <div class="bracket-column">
                <div class="column-header">Cuartos</div>
                <div class="match-box" id="match-cuartosA"></div>
                <div class="match-box" id="match-cuartosB"></div>
            </div>

            <div class="bracket-column">
                <div class="column-header">Semifinal</div>
                <div class="match-box" id="match-semiIzq"></div>
            </div>

            <div class="bracket-column">
                <div class="column-header">Gran Final</div>
                <div class="match-box grand-final-box" id="match-granFinal"></div>
            </div>

            <div class="bracket-column">
                <div class="column-header">Semifinal</div>
                <div class="match-box" id="match-semiDer"></div>
            </div>

            <div class="bracket-column">
                <div class="column-header">Cuartos</div>
                <div class="match-box" id="match-cuartosC"></div>
                <div class="match-box" id="match-cuartosD"></div>
            </div>

            <div class="bracket-column">
                <div class="column-header">Octavos</div>
                <div class="match-box" id="match-octavos5"></div>
                <div class="match-box" id="match-octavos6"></div>
                <div class="match-box" id="match-octavos7"></div>
                <div class="match-box" id="match-octavos8"></div>
            </div>

        </main>
    </div>

    <footer>
        Hecho por Consejo Estudiantil 2026
    </footer>

    <script>
        const torneoData = {
            octavos: {
                octavos1: { id: "Match 01", equipo1: { nombre: "España", code: "ESP", clasif: "1.º A" }, equipo2: { nombre: "Marruecos", code: "MAR", clasif: "1.º B" }, ganador: "" },
                octavos2: { id: "Match 02", equipo1: { nombre: "Egipto", code: "EGY", clasif: "1.º C" }, equipo2: { nombre: "Inglaterra", code: "ENG", clasif: "1.º D" }, ganador: "" },
                octavos3: { id: "Match 03", equipo1: { nombre: "Suecia", code: "SWE", clasif: "1.º E" }, equipo2: { nombre: "Países Bajos", code: "NED", clasif: "2.º A" }, ganador: "" },
                octavos4: { id: "Match 04", equipo1: { nombre: "México", code: "MEX", clasif: "2.º B" }, equipo2: { nombre: "Francia", code: "FRA", clasif: "2.º C" }, ganador: "" },
                octavos5: { id: "Match 05", equipo1: { nombre: "Australia", code: "AUS", clasif: "2.º D" }, equipo2: { nombre: "Uruguay", code: "URU", clasif: "2.º E" }, ganador: "" },
                octavos6: { id: "Match 06", equipo1: { nombre: "Nueva Zelanda", code: "NZL", clasif: "3.º A" }, equipo2: { nombre: "Noruega", code: "NOR", clasif: "3.º B" }, ganador: "" },
                octavos7: { id: "Match 07", equipo1: { nombre: "Estados Unidos", code: "USA", clasif: "3.º C" }, equipo2: { nombre: "Japón", code: "JPN", clasif: "3.º D" }, ganador: "" },
                octavos8: { id: "Match 08", equipo1: { nombre: "Argentina", code: "ARG", clasif: "3.º E" }, equipo2: { nombre: "Colombia", code: "COL", clasif: "4.º Comp" }, ganador: "" }
            },
            cuartos: {
                cuartosA: { id: "Cuartos A", prov1: "Ganador M01", prov2: "Ganador M02", ganador: "" },
                cuartosB: { id: "Cuartos B", prov1: "Ganador M03", prov2: "Ganador M04", ganador: "" },
                cuartosC: { id: "Cuartos C", prov1: "Ganador M05", prov2: "Ganador M06", ganador: "" },
                cuartosD: { id: "Cuartos D", prov1: "Ganador M07", prov2: "Ganador M08", ganador: "" }
            },
            semifinales: {
                semiIzq: { id: "Semi Izq", prov1: "Ganador Cuartos A", prov2: "Ganador Cuartos B", ganador: "" },
                semiDer: { id: "Semi Der", prov1: "Ganador Cuartos C", prov2: "Ganador Cuartos D", ganador: "" }
            },
            final: {
                granFinal: { id: "Final Absoluta", prov1: "Ganador Semi Izq", prov2: "Ganador Semi Der", ganador: "" }
            }
        };

        function procesarEvolucion() {
            const d = torneoData;
            const obtenerEquipo = (nombre) => {
                for(let k in d.octavos) {
                    if(d.octavos[k].equipo1.nombre === nombre) return d.octavos[k].equipo1;
                    if(d.octavos[k].equipo2.nombre === nombre) return d.octavos[k].equipo2;
                }
                return null;
            };

            if (d.octavos.octavos1.ganador) d.cuartos.cuartosA.equipo1 = obtenerEquipo(d.octavos.octavos1.ganador);
            if (d.octavos.octavos2.ganador) d.cuartos.cuartosA.equipo2 = obtenerEquipo(d.octavos.octavos2.ganador);
            if (d.octavos.octavos3.ganador) d.cuartos.cuartosB.equipo1 = obtenerEquipo(d.octavos.octavos3.ganador);
            if (d.octavos.octavos4.ganador) d.cuartos.cuartosB.equipo2 = obtenerEquipo(d.octavos.octavos4.ganador);
            if (d.octavos.octavos5.ganador) d.cuartos.cuartosC.equipo1 = obtenerEquipo(d.octavos.octavos5.ganador);
            if (d.octavos.octavos6.ganador) d.cuartos.cuartosC.equipo2 = obtenerEquipo(d.octavos.octavos6.ganador);
            if (d.octavos.octavos7.ganador) d.cuartos.cuartosD.equipo1 = obtenerEquipo(d.octavos.octavos7.ganador);
            if (d.octavos.octavos8.ganador) d.cuartos.cuartosD.equipo2 = obtenerEquipo(d.octavos.octavos8.ganador);

            if (d.cuartos.cuartosA.ganador) d.semifinales.semiIzq.equipo1 = obtenerEquipo(d.cuartos.cuartosA.ganador);
            if (d.cuartos.cuartosB.ganador) d.semifinales.semiIzq.equipo2 = obtenerEquipo(d.cuartos.cuartosB.ganador);
            if (d.cuartos.cuartosC.ganador) d.semifinales.semiDer.equipo1 = obtenerEquipo(d.cuartos.cuartosC.ganador);
            if (d.cuartos.cuartosD.ganador) d.semifinales.semiDer.equipo2 = obtenerEquipo(d.cuartos.cuartosD.ganador);

            if (d.semifinales.semiIzq.ganador) d.final.granFinal.equipo1 = obtenerEquipo(d.semifinales.semiIzq.ganador);
            if (d.semifinales.semiDer.ganador) d.final.granFinal.equipo2 = obtenerEquipo(d.semifinales.semiDer.ganador);
        }

        function construirFilaHTML(equipo, ganador, fallbackText) {
            if (!equipo) {
                return `<div class="team-slot pending"><div class="team-meta"><div class="team-badge-ui">--</div><span>${fallbackText}</span></div></div>`;
            }
            let statusClass = (ganador) ? ((ganador === equipo.nombre) ? "winner" : "loser") : "";
            return `
                <div class="team-slot ${statusClass}">
                    <div class="team-meta">
                        <div class="team-badge-ui">${equipo.code}</div>
                        <span>${equipo.nombre}</span>
                    </div>
                    <span class="team-rank">${equipo.clasif}</span>
                </div>
            `;
        }

        function dibujarPartido(idDom, partido) {
            const box = document.getElementById(idDom);
            if (!box) return;

            const f1 = construirFilaHTML(partido.equipo1, partido.ganador, partido.prov1 || "Por definir");
            const f2 = construirFilaHTML(partido.equipo2, partido.ganador, partido.prov2 || "Por definir");

            let banner = (idDom === 'match-granFinal' && partido.ganador) ? `<div class="champion-banner" style="display:block;">¡CAMPEÓN: ${partido.ganador.toUpperCase()}!</div>` : "";

            box.innerHTML = `
                <div class="match-header">
                    <span>${partido.id}</span>
                    <span style="color: ${partido.ganador ? 'var(--brand-green)' : 'var(--text-muted)'}; font-weight: bold;">
                        ${partido.ganador ? 'FIN' : 'PENDIENTE'}
                    </span>
                </div>
                ${f1} ${f2} ${banner}
            `;
        }

        function inicializarArbol() {
            procesarEvolucion();
            for (let k in torneoData.octavos) dibujarPartido(`match-${k}`, torneoData.octavos[k]);
            for (let k in torneoData.cuartos) dibujarPartido(`match-${k}`, torneoData.cuartos[k]);
            for (let k in torneoData.semifinales) dibujarPartido(`match-${k}`, torneoData.semifinales[k]);
            for (let k in torneoData.final) dibujarPartido(`match-${k}`, torneoData.final[k]);
        }

        window.addEventListener('DOMContentLoaded', inicializarArbol);
    </script>
</body>
</html>
